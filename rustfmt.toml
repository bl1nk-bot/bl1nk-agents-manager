# ==============================================================================
# Rustfmt Configuration for BL1NK Agents Manager (Stable Compatible)
# ==============================================================================

# General
edition = "2021"
newline_style = "Unix"

# Formatting
max_width = 120
tab_spaces = 4
use_field_init_shorthand = true
use_try_shorthand = true

# Unstable features disabled for Stable compatibility
# match_arm_blocks = true
# combine_control_expr = true
# group_imports = "StdExternalCrate"
# imports_granularity = "Crate"
