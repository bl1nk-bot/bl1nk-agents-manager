name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  parallel-checks:
    name: Parallel Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run parallel checks
        run: bash scripts/parallel-check.sh --verbose

      - name: Upload check logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-logs
          path: target/check-logs/
          retention-days: 7

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: parallel-checks
    strategy:
      matrix:
        features:
          - ''
          - '--features bundle-pmat'
          - '--features bundle-pmat-full'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build ${{ matrix.features }} --release

      - name: Run tests
        run: cargo test --all-features

      - name: Upload binary
        if: matrix.features == '--features bundle-pmat'
        uses: actions/upload-artifact@v4
        with:
          name: bl1nk-agents-manager
          path: target/release/bl1nk-agents-manager
          retention-days: 30

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings || true

      - name: Check insecure patterns
        run: |
          echo "🔍 Checking for insecure patterns..."
          
          # Check passwords
          if grep -rn 'password\s*=\s*"' --include="*.rs" src/; then
            echo "::error::Found hardcoded password"
            exit 1
          fi
          
          # Check API keys
          if grep -rn 'api_key\s*=\s*"' --include="*.rs" src/; then
            echo "::error::Found hardcoded API key"
            exit 1
          fi
          
          echo "✅ No insecure patterns found"

  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint PR commits
        run: bash scripts/commitlint.sh --range origin/main..HEAD
