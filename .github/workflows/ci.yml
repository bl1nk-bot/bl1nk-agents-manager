name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-gate:
    name: Parallel Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run parallel checks (fmt, clippy, tests, agents)
        run: bash scripts/parallel-check.sh

  security-audit:
    name: Security & Policy Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings || true

      - name: Check insecure patterns & secrets
        run: |
          echo "🔍 Scanning for sensitive data and insecure patterns..."
          # Scan for passwords/keys in Rust code
          grep -rnE "password\s*=\s*\"|api_key\s*=\s*\"|secret\s*=\s*\"" --include="*.rs" src/ && (echo "::error::Found hardcoded secrets"; exit 1) || echo "✅ No secrets found in code"
          
          # Scan for unquoted wildcards in agent policies
          grep -rn "toolName: \*" agents/ && echo "::warning::Found wildcard in agent policy, ensure it is intentional"
          
          echo "✅ Security scan complete"

  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: quality-gate
    strategy:
      matrix:
        features:
          - '--features bundle-pmat'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build ${{ matrix.features }} --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bl1nk-agents-manager
          path: target/release/bl1nk-agents-manager
          retention-days: 30
