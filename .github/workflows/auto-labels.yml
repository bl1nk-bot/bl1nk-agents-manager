name: Bl1nk Auto Labels

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue/PR number'
        required: true
        type: number
      preset:
        description: 'Override with preset'
        required: false
        type: choice
        options:
          - ''
          - feature
          - hotfix
          - docs-translate
          - mobile-ui
      add_labels:
        description: 'Add labels (space-separated, e.g. agent:claude type:feat)'
        required: false
        type: string
      remove_labels:
        description: 'Remove labels (space-separated)'
        required: false
        type: string

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up script
        run: chmod +x scripts/edit-issue-labels.sh

      - name: Auto-label (from title/body)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/edit-issue-labels.sh

      - name: Apply preset override
        if: ${{ github.event.inputs.preset != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/edit-issue-labels.sh --preset "${{ github.event.inputs.preset }}"

      - name: Apply custom labels
        if: ${{ github.event.inputs.add_labels != '' || github.event.inputs.remove_labels != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -a ADD_ARGS
          declare -a REMOVE_ARGS
          
          if [[ -n "${{ github.event.inputs.add_labels }}" ]]; then
            mapfile -t LABELS < <(echo "${{ github.event.inputs.add_labels }}" | tr ' ' '\n')
            for label in "${LABELS[@]}"; do
              ADD_ARGS+=("--add-label" "$label")
            done
          fi
          
          if [[ -n "${{ github.event.inputs.remove_labels }}" ]]; then
            mapfile -t LABELS < <(echo "${{ github.event.inputs.remove_labels }}" | tr ' ' '\n')
            for label in "${LABELS[@]}"; do
              REMOVE_ARGS+=("--remove-label" "$label")
            done
          fi
          
          scripts/edit-issue-labels.sh "${ADD_ARGS[@]}" "${REMOVE_ARGS[@]}"
