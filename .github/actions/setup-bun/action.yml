name: "Setup Bun"
description: "Setup Bun with caching and install dependencies"
runs:
  using: "composite"
  steps:
    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Get baseline download URL
      id: bun-url
      shell: bash
      run: |
        if [ "$RUNNER_ARCH" = "X64" ]; then
          # 🛡️ ตรวจสอบว่ามี package.json หรือไม่ ถ้าไม่มีให้ใช้เวอร์ชัน 1.1.0 เป็นค่าเริ่มต้น
          if [ -f "package.json" ]; then
            V=$(node -p "require('./package.json').packageManager ? require('./package.json').packageManager.split('@')[1] : '1.1.0'")
          else
            V="1.1.0"
          fi
          
          case "$RUNNER_OS" in
            macOS)   OS=darwin ;;
            Linux)   OS=linux ;;
            Windows) OS=windows ;;
          esac
          echo "url=https://github.com/oven-sh/bun/releases/download/bun-v${V}/bun-${OS}-x64-baseline.zip" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        # 🛡️ ระบุเวอร์ชันตรงๆ ถ้าไม่มีไฟล์ให้ค้นหา
        bun-version: "1.1.0"
        bun-download-url: ${{ steps.bun-url.outputs.url }}

    - name: Install dependencies
      # 🛡️ รัน bun install เฉพาะเมื่อมีไฟล์ที่เกี่ยวข้องเท่านั้น
      run: |
        if [ -f "package.json" ]; then
          bun install
        else
          echo "No package.json found, skipping bun install."
        fi
      shell: bash
